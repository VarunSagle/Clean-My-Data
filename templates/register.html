<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Clean My Data</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:430px;
            border:none;
            border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,.1);
        }

        .card-header{
            background:#198754;
            color:white;
            text-align:center;
            font-size:28px;
            font-weight:bold;
            padding:20px;
        }

        .btn-success{
            width:100%;
        }

    </style>

</head>

<body>

<div class="card">

    <div class="card-header">
        Create Account
    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input
                type="text"
                class="form-control"
                name="username"
                required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input
                type="email"
                class="form-control"
                name="email"
                required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input
                type="password"
                class="form-control"
                name="password"
                required>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input
                type="password"
                class="form-control"
                name="confirm_password"
                required>
            </div>

            <button class="btn btn-success">
                Register
            </button>

        </form>

        <hr>

        <p class="text-center">

            Already have an account?

            <a href="{{ url_for('auth.login') }}">
                Login
            </a>

        </p>

    </div>

</div>

</body>
</html>
