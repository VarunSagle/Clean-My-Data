<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Clean My Data</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

background:#eef2f7;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.card{

width:420px;

border:none;

border-radius:12px;

box-shadow:0 10px 25px rgba(0,0,0,.1);

}

.card-header{

background:#0d6efd;

color:white;

text-align:center;

font-size:28px;

font-weight:bold;

padding:20px;

}

.btn-primary{

width:100%;

}

</style>

</head>

<body>

<div class="card">

<div class="card-header">

Login

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>Email</label>

<input
type="email"
class="form-control"
name="email"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
class="form-control"
name="password"
required>

</div>

<button class="btn btn-primary">

Login

</button>

</form>

<hr>

<p class="text-center">

Don't have an account?

<a href="{{ url_for('auth.register' ) }}">

Register

</a>

</p>

</div>

</div>

</body>
</html>
