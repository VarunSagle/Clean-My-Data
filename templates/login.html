<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Clean My Data</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#eef4ff,#d9e8ff);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
}

.card{
    width:430px;
    border:none;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
    transition:.3s;
}

.card:hover{
    transform:translateY(-4px);
}

.card-header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:25px;
}

.card-header h2{
    margin-bottom:5px;
    font-weight:bold;
}

.card-header p{
    margin:0;
    opacity:.9;
    font-size:15px;
}

.card-body{
    padding:35px;
}

.form-label{
    font-weight:600;
    color:#555;
}

.form-control{
    border-radius:10px;
    padding:12px;
}

.form-control:focus{
    box-shadow:0 0 0 .2rem rgba(13,110,253,.2);
}

.btn-primary{
    width:100%;
    border-radius:10px;
    padding:12px;
    font-size:17px;
    font-weight:bold;
}

.btn-primary:hover{
    transform:translateY(-2px);
}

.error-box{
    background:#fdecea;
    color:#b71c1c;
    border-left:5px solid #dc3545;
    padding:12px;
    border-radius:8px;
    margin-bottom:20px;
    font-weight:600;
}

.footer-text{
    text-align:center;
    color:#666;
    margin-top:20px;
    font-size:14px;
}

.footer-text a{
    text-decoration:none;
    font-weight:bold;
}

.logo{
    font-size:55px;
    margin-bottom:10px;
}

</style>

</head>

<body>

<div class="card">

    <div class="card-header">

        <div class="logo">📊</div>

        <h2>Clean My Data</h2>

        <p>Sign in to access your dashboard</p>

    </div>

    <div class="card-body">

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input
                    type="email"
                    class="form-control"
                    name="email"
                    placeholder="Enter your email"
                    required>
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input
                    type="password"
                    class="form-control"
                    name="password"
                    placeholder="Enter your password"
                    required>
            </div>

            <button type="submit" class="btn btn-primary">
                🔑 Login
            </button>

        </form>

        <hr>

        <p class="footer-text">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}">
                Create Account
            </a>
        </p>

    </div>

</div>

</body>
</html>
